<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Contraseñas</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e14;
      --panel: #111720;
      --border: rgba(0,255,136,0.15);
      --green: #00ff88;
      --green2: #00cc6a;
      --dim: #3d5a4a;
      --text: #d4e8dc;
      --muted: #567060;
    }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 3rem 1.5rem;
    }

    .terminal-bar {
      width: 100%; max-width: 560px;
      background: #1a2230;
      border-radius: 12px 12px 0 0;
      padding: 0.75rem 1.2rem;
      display: flex; align-items: center; gap: 0.6rem;
      border: 1px solid var(--border); border-bottom: none;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .terminal-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto; margin-right: auto;
    }

    .card {
      width: 100%; max-width: 560px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      padding: 2rem;
    }

    .label-mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .password-display {
      background: #070b10;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.4rem;
      margin-bottom: 1.5rem;
      position: relative;
      min-height: 80px;
      display: flex; align-items: center;
    }
    #password-output {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      color: var(--green);
      word-break: break-all;
      line-height: 1.5;
      flex: 1;
    }
    .copy-btn {
      position: absolute; top: 0.8rem; right: 0.8rem;
      background: rgba(0,255,136,0.08);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(0,255,136,0.18); }

    .strength-bar {
      height: 4px; border-radius: 2px;
      background: #1a2230;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      transition: width 0.4s, background 0.4s;
    }

    .options { display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 2rem; }

    .option-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .option-label { font-size: 0.9rem; color: var(--text); }
    .option-sub { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 42px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #1a2230; border: 1px solid var(--dim);
      border-radius: 999px; transition: 0.3s;
    }
    .slider::before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: var(--muted); border-radius: 50%; transition: 0.3s;
    }
    input:checked + .slider { background: rgba(0,255,136,0.15); border-color: var(--green); }
    input:checked + .slider::before { transform: translateX(18px); background: var(--green); }

    /* Length slider */
    .length-row { display: flex; flex-direction: column; gap: 0.6rem; }
    .length-header { display: flex; justify-content: space-between; }
    #length-val {
      font-family: 'IBM Plex Mono', monospace;
      color: var(--green); font-size: 0.9rem;
    }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: #1a2230; border-radius: 2px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--green); cursor: pointer;
      border: 2px solid var(--bg);
    }

    .generate-btn {
      width: 100%;
      background: var(--green);
      color: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 1rem;
      border: none; border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .generate-btn:hover { opacity: 0.88; }
    .generate-btn:active { transform: scale(0.98); }

    .history {
      margin-top: 2rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
    .history-list { margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .history-item {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 0.5rem 0.8rem;
      background: #070b10;
      border-radius: 6px;
      border: 1px solid rgba(0,255,136,0.06);
      display: flex; justify-content: space-between;
    }
    .history-item span { color: var(--dim); font-size: 0.7rem; }

    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--green); color: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem; font-weight: 600;
      padding: 0.6rem 1.5rem; border-radius: 999px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="terminal-bar">
  <div class="dot" style="background:#ff5f56"></div>
  <div class="dot" style="background:#ffbd2e"></div>
  <div class="dot" style="background:#27c93f"></div>
  <div class="terminal-title">password-generator.py — running</div>
</div>

<div class="card">

  <div class="label-mono">Contraseña generada</div>
  <div class="password-display">
    <span id="password-output">Presiona generar...</span>
    <button class="copy-btn" onclick="copiar()">[ copiar ]</button>
  </div>

  <div class="strength-bar">
    <div class="strength-fill" id="strength-fill" style="width:0%"></div>
  </div>

  <div class="options">

    <div class="length-row">
      <div class="length-header">
        <div class="option-label">Longitud</div>
        <span id="length-val">16</span>
      </div>
      <input type="range" min="6" max="64" value="16" step="1" id="length-range"
        oninput="document.getElementById('length-val').textContent=this.value; generate()" />
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Mayúsculas</div>
        <div class="option-sub">A B C D E F...</div>
      </div>
      <label class="toggle"><input type="checkbox" id="opt-upper" checked onchange="generate()"><span class="slider"></span></label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Números</div>
        <div class="option-sub">0 1 2 3 4 5...</div>
      </div>
      <label class="toggle"><input type="checkbox" id="opt-num" checked onchange="generate()"><span class="slider"></span></label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Símbolos</div>
        <div class="option-sub">! @ # $ % &...</div>
      </div>
      <label class="toggle"><input type="checkbox" id="opt-sym" onchange="generate()"><span class="slider"></span></label>
    </div>

    <div class="option-row">
      <div>
        <div class="option-label">Sin ambiguos</div>
        <div class="option-sub">Excluye l, 1, O, 0</div>
      </div>
      <label class="toggle"><input type="checkbox" id="opt-noamb" onchange="generate()"><span class="slider"></span></label>
    </div>

  </div>

  <button class="generate-btn" onclick="generate()">⟳ GENERAR CONTRASEÑA</button>

  <div class="history">
    <div class="label-mono">Historial reciente</div>
    <div class="history-list" id="history-list">
      <div style="font-size:0.8rem;color:var(--muted)">Sin historial aún.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ Copiado al portapapeles</div>

<script>
const lower = 'abcdefghijkmnpqrstuvwxyz';
const lowerFull = 'abcdefghijklmnopqrstuvwxyz';
const upper = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
const upperFull = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const nums = '23456789';
const numsFull = '0123456789';
const syms = '!@#$%^&*-_=+?';

let history = [];

function generate() {
  const len = parseInt(document.getElementById('length-range').value);
  const useUpper = document.getElementById('opt-upper').checked;
  const useNum = document.getElementById('opt-num').checked;
  const useSym = document.getElementById('opt-sym').checked;
  const noAmb = document.getElementById('opt-noamb').checked;

  let charset = noAmb ? lower : lowerFull;
  if (useUpper) charset += noAmb ? upper : upperFull;
  if (useNum) charset += noAmb ? nums : numsFull;
  if (useSym) charset += syms;

  if (!charset) return;

  let pwd = '';
  for (let i = 0; i < len; i++) {
    pwd += charset[Math.floor(Math.random() * charset.length)];
  }

  document.getElementById('password-output').textContent = pwd;
  updateStrength(pwd, useUpper, useNum, useSym);
  addHistory(pwd);
}

function updateStrength(pwd, upper, num, sym) {
  let score = 0;
  if (pwd.length >= 8) score += 20;
  if (pwd.length >= 12) score += 20;
  if (pwd.length >= 20) score += 10;
  if (upper) score += 20;
  if (num) score += 15;
  if (sym) score += 15;

  const fill = document.getElementById('strength-fill');
  fill.style.width = score + '%';
  fill.style.background = score < 40 ? '#ff4444' : score < 70 ? '#ffaa00' : '#00ff88';
}

function addHistory(pwd) {
  history.unshift({ pwd, time: new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'}) });
  if (history.length > 5) history.pop();
  const list = document.getElementById('history-list');
  list.innerHTML = history.map(h =>
    `<div class="history-item">${h.pwd}<span>${h.time}</span></div>`
  ).join('');
}

function copiar() {
  const pwd = document.getElementById('password-output').textContent;
  if (pwd === 'Presiona generar...') return;
  navigator.clipboard.writeText(pwd).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

generate();
</script>
</body>
</html>
