<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recetario — Mi Cocina</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf7f2;
      --warm: #f0e8d8;
      --brown: #3d2b1f;
      --rust: #c45c26;
      --muted: #8a7560;
      --border: #e0d5c5;
    }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--brown); }

    header {
      background: var(--brown);
      color: var(--cream);
      text-align: center;
      padding: 4rem 2rem 3rem;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '🌿';
      position: absolute; font-size: 8rem; opacity: 0.06;
      top: -10px; left: -20px; transform: rotate(-20deg);
    }
    header::after {
      content: '🌿';
      position: absolute; font-size: 8rem; opacity: 0.06;
      bottom: -20px; right: -10px; transform: rotate(160deg);
    }
    .header-tag {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.65);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.2rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.8rem;
    }
    header h1 em { font-style: italic; color: #e8a87c; }
    header p { color: rgba(255,255,255,0.55); font-weight: 300; font-size: 1rem; }

    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 0;
      position: sticky; top: 0; z-index: 10;
    }
    .filter-btn {
      background: none; border: none;
      padding: 1rem 1.6rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--brown); }
    .filter-btn.active { color: var(--rust); border-bottom-color: var(--rust); }

    main { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(61,43,31,0.12); }

    .card-img {
      height: 200px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      position: relative;
    }
    .card-category {
      position: absolute; top: 12px; right: 12px;
      background: white;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--rust);
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-weight: 500;
    }

    .card-body { padding: 1.4rem; }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: var(--brown);
    }
    .card-desc { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 1.2rem; }
    .card-meta {
      display: flex; gap: 1.2rem;
      font-size: 0.8rem; color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .card-meta span::before { margin-right: 0.3rem; }

    /* MODAL */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(61,43,31,0.6); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center; padding: 2rem;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--cream); border-radius: 20px;
      max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto;
      padding: 2.5rem; position: relative;
    }
    .modal-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      background: var(--warm); border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 1rem; cursor: pointer;
      color: var(--brown); display: flex; align-items: center; justify-content: center;
    }
    .modal-emoji { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; margin-bottom: 0.4rem; }
    .modal-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .modal-section { margin-bottom: 1.5rem; }
    .modal-section h3 {
      font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--rust); margin-bottom: 0.8rem;
    }
    .ingredient-list { list-style: none; }
    .ingredient-list li {
      padding: 0.45rem 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem; display: flex; justify-content: space-between;
    }
    .step { display: flex; gap: 1rem; margin-bottom: 0.8rem; align-items: flex-start; }
    .step-num {
      min-width: 26px; height: 26px; border-radius: 50%;
      background: var(--rust); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 500; margin-top: 2px;
    }
    .step p { font-size: 0.9rem; color: var(--brown); line-height: 1.6; }

    footer {
      text-align: center; padding: 2rem;
      color: var(--muted); font-size: 0.82rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-tag">Recetario Personal</div>
  <h1>Mi <em>Cocina</em></h1>
  <p>Recetas simples, sabores memorables</p>
</header>

<nav>
  <button class="filter-btn active" onclick="filter('todos', this)">Todos</button>
  <button class="filter-btn" onclick="filter('desayuno', this)">Desayuno</button>
  <button class="filter-btn" onclick="filter('almuerzo', this)">Almuerzo</button>
  <button class="filter-btn" onclick="filter('cena', this)">Cena</button>
  <button class="filter-btn" onclick="filter('postre', this)">Postre</button>
</nav>

<main>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <span class="modal-emoji" id="m-emoji"></span>
    <h2 id="m-title"></h2>
    <p class="modal-subtitle" id="m-desc"></p>
    <div class="modal-section">
      <h3>Ingredientes</h3>
      <ul class="ingredient-list" id="m-ingredients"></ul>
    </div>
    <div class="modal-section">
      <h3>Preparación</h3>
      <div id="m-steps"></div>
    </div>
  </div>
</div>

<footer>Proyecto de portafolio — Recetario Web · Hecho con HTML & CSS</footer>

<script>

      ['Aceite de oliva', '3 cdas'],

  {

    titulo: 'Ensalada mediterránea',

    tiempo: '10 min',

    dificultad: 'Muy fácil',
    bg: '#f0fff5',
    ingredientes: [
      ['Lechuga romana', '1 cabeza'],

      ['Sal y pimienta', 'al gusto'],
    ],
    pasos: [
      'Mezcla el jugo de limón, ajo machacado, romero y aceite.',
      'Marina el pollo en esa mezcla por al menos 30 minutos.',

  {
    emoji: '🍮',

      ['Leche entera', '500 ml'],

      'Prepara el caramelo: derrite el azúcar a fuego medio hasta dorar.',
      'Vierte el caramelo en el molde y deja solidificar.',

  {

    categoria: 'desayuno',
    tiempo: '10 min',
    porciones: '1 persona',
    dificultad: 'Muy fácil',
    bg: '#f5f0ff',
    ingredientes: [
      ['Avena', '½ taza'],
      ['Leche o agua', '1 taza'],

      ['Plátano', '½ unidad'],

      ['Canela', '1 pizca'],
    ],
    pasos: [
      'Lleva la leche a fuego medio en una olla pequeña.',
      'Agrega la avena y cocina 5 min revolviendo constantemente.',
      'Retira del fuego, añade la miel y la canela.',
      'Sirve en un bol y decora con las frutas en rodajas.',
    ]

let current = null;

function renderCards(filter = 'todos') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  recetas
    .filter(r => filter === 'todos' || r.categoria === filter)
    .forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-img" style="background:${r.bg}">
          <span>${r.emoji}</span>
          <span class="card-category">${r.categoria}</span>
        </div>
        <div class="card-body">
          <div class="card-title">${r.titulo}</div>
          <div class="card-desc">${r.descripcion}</div>
          <div class="card-meta">
            <span>⏱ ${r.tiempo}</span>
            <span>🍽 ${r.porciones}</span>
            <span>⭐ ${r.dificultad}</span>
          </div>
        </div>`;
      card.onclick = () => openModal(i, filter);
      grid.appendChild(card);
    });
}

function openModal(idx, f) {
  const filtered = recetas.filter(r => f === 'todos' || r.categoria === f);
  const r = filtered[idx];
  document.getElementById('m-emoji').textContent = r.emoji;
  document.getElementById('m-title').textContent = r.titulo;
  document.getElementById('m-desc').textContent = r.descripcion + ` · ${r.tiempo} · ${r.porciones}`;
  document.getElementById('m-ingredients').innerHTML = r.ingredientes.map(([n, c]) =>
    `<li><span>${n}</span><span style="color:var(--rust)">${c}</span></li>`).join('');
  document.getElementById('m-steps').innerHTML = r.pasos.map((p, i) =>
    `<div class="step"><div class="step-num">${i+1}</div><p>${p}</p></div>`).join('');
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

let activeFilter = 'todos';
function filter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat);
}

renderCards();
</script>
</body>
</html>
